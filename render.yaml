# render.yaml — Render reads this automatically when you connect your repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: quoteorigin-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false          # you'll paste this in Render dashboard
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string here
      - key: NEWS_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # your Vercel URL, e.g. https://quoteorigin.vercel.app
    healthCheckPath: /health
